<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Daniel! ⛳️🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container">
        <div class="card">
            <div class="front">
                <div class="content">
                    <h1>¡Feliz Cumpleaños, Daniel-ito! 🎉</h1>
                    <img src="golf_bday.png" alt="Tarjeta de Golf" class="main-img pulsating-img">
                    <p class="instruction">Haz clic para abrir ✨</p>
                </div>
            </div>
            <div class="back">
                <div class="content">
                    <h2>De parte de Titi 👇</h2>
                    <img src="pastell.png" alt="Foto de Daniel" class="profile-img">
                    
                    <p class="message">
                        ¡Daniel-ito! Te deseo lo mejor en este día tan especial. Que sigas logrando muchos éxitos y hoyos en uno ⛳️ en la vida. Pásatela de maravilla. 🍻
                    </p>
                    
                    <p class="signature">
                        Te quiere, <br>
                        <strong>Titi ❤️</strong>
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
